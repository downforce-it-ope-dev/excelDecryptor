<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>엑셀 암호 해제</title>
  <style>
    :root {
      --bg: #f4efe7;
      --panel: #fffaf4;
      --text: #1e1b18;
      --sub: #6f655d;
      --line: #d8c9b5;
      --accent: #9a3412;
      --accent-strong: #7c2d12;
      --danger-bg: #fef2f2;
      --danger-text: #991b1b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", "Malgun Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #f9dcc4 0, transparent 28%),
        radial-gradient(circle at bottom right, #fcd5ce 0, transparent 24%),
        var(--bg);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(100%, 560px);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 18px 50px rgba(80, 52, 24, 0.12);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 30px;
      line-height: 1.2;
    }

    p {
      margin: 0 0 20px;
      color: var(--sub);
      line-height: 1.6;
    }

    label {
      display: block;
      margin: 16px 0 8px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      font-size: 15px;
    }

    button {
      width: 100%;
      margin-top: 22px;
      padding: 14px 16px;
      border: 0;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-strong);
    }

    .error {
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      background: var(--danger-bg);
      color: var(--danger-text);
      line-height: 1.5;
    }

    .hint {
      margin-top: 16px;
      font-size: 14px;
      color: var(--sub);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>엑셀 암호 해제</h1>
    <p>엑셀 파일을 업로드하면 고정 비밀번호로 복호화한 뒤 파일명에 (암호화 제거)를 붙여 바로 다운로드합니다.</p>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" enctype="multipart/form-data">
      <label for="excel_file">엑셀 파일</label>
      <input id="excel_file" name="excel_file" type="file" accept=".xls,.xlsx,.xlsm,.xlsb" required>

      <button type="submit">암호 해제 후 다운로드</button>
    </form>

    <div class="hint">
      일부 오래된 xls 파일은 암호화 방식에 따라 복호화가 실패할 수 있습니다.
    </div>
  </main>
  <script>
    (function () {
      const clientId = "{{ client_id }}";
      const ping = function () {
        fetch("/ping", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ clientId: clientId })
        }).catch(function () {});
      };

      ping();
      const intervalId = setInterval(ping, 5000);

      window.addEventListener("beforeunload", function () {
        clearInterval(intervalId);
        navigator.sendBeacon(
          "/disconnect",
          new Blob([JSON.stringify({ clientId: clientId })], { type: "application/json" })
        );
      });
    })();
  </script>
</body>
</html>
